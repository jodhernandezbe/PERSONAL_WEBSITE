<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      .leaf { fill: #2ecc71; }
      .node { fill: white; }
      .stem { stroke: #27ae60; fill: none; stroke-width: 1; }
    </style>
  </defs>

  <!-- Main leaf shape -->
  <path class="leaf" d="M16 4c-6 0-10 4-10 12 0 4 2 7 5 9l5 3 5-3c3-2 5-5 5-9 0-8-4-12-10-12z"/>

  <!-- Central stem/vein -->
  <line class="stem" x1="16" y1="8" x2="16" y2="24"/>

  <!-- Side veins with nodes -->
  <line class="stem" x1="16" y1="12" x2="12" y2="15"/>
  <line class="stem" x1="16" y1="12" x2="20" y2="15"/>
  <line class="stem" x1="16" y1="18" x2="13" y2="20"/>
  <line class="stem" x1="16" y1="18" x2="19" y2="20"/>

  <!-- Circuit nodes -->
  <circle class="node" cx="16" cy="8" r="1.2"/>
  <circle class="node" cx="12" cy="15" r="1"/>
  <circle class="node" cx="20" cy="15" r="1"/>
  <circle class="node" cx="16" cy="12" r="1"/>
  <circle class="node" cx="16" cy="18" r="1"/>
  <circle class="node" cx="13" cy="20" r="0.8"/>
  <circle class="node" cx="19" cy="20" r="0.8"/>
</svg>